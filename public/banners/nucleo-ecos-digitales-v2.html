<style>
  /* =========================================================
     Page chrome (only for preview — NOT part of the banner export)
     ========================================================= */
  :root {
    --orange:        #FF6B00;     /* brief-specified Naranja Núcleo */
    --orange-soft:   #ff8a3d;
    --orange-deep:   #d44b00;
    --ink:           #0A0A0A;
    --ink-2:         #050505;
    --white:         #ffffff;
    --gray-1:        #c8c8c8;
    --gray-2:        #8a8a8a;
    --gray-3:        #5a5a5a;
  }

  html, body {
    margin: 0;
    padding: 0;
    background:
      radial-gradient(1200px 600px at 20% 0%, #141414 0%, transparent 60%),
      radial-gradient(900px 500px at 90% 100%, #0e0e0e 0%, transparent 55%),
      #060606;
    color: #b8b8b8;
    font-family: 'Geist', system-ui, -apple-system, Segoe UI, Helvetica, Arial, sans-serif;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 40px 24px;
  }

  .preview-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  .preview-label {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gray-3);
  }
  .preview-label b { color: var(--gray-1); font-weight: 500; }

  /* =========================================================
     THE BANNER — everything below is self-contained for export
     950 × 75, single anchor, CSS-only animation
     ========================================================= */
  .nl-banner {
    /* fixed canvas */
    width: 950px;
    height: 75px;
    display: block;
    position: relative;
    overflow: hidden;
    text-decoration: none;
    color: var(--white);
    cursor: pointer;
    isolation: isolate;

    background:
      /* warm orange ember bottom-right */
      radial-gradient(560px 260px at 100% 130%, rgba(255,107,0,0.22) 0%, rgba(255,107,0,0.06) 35%, transparent 65%),
      /* cool wash top-left for depth */
      radial-gradient(420px 220px at 0% -40%, rgba(255,255,255,0.04) 0%, transparent 60%),
      /* base ramp */
      linear-gradient(120deg, #0a0a0a 0%, #0f0f10 55%, #131111 100%);

    /* subtle outer ring + warm inner shadow so it feels "lifted" */
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.06),
      0 10px 30px -10px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.05),
      inset 0 -60px 80px -40px rgba(255,107,0,0.10);

    font-family: 'Geist', system-ui, -apple-system, Segoe UI, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1;
  }

  /* faint dotted grid for "tech" texture */
  .nl-banner::before {
    content: "";
    position: absolute; inset: 0;
    background-image:
      radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 22px 22px;
    background-position: 0 0;
    opacity: 0.45;
    mix-blend-mode: screen;
    pointer-events: none;
    z-index: 0;
  }

  /* travelling orange glow — slow, never blinky */
  .nl-banner::after {
    content: "";
    position: absolute;
    right: -120px;
    bottom: -160px;
    width: 380px;
    height: 380px;
    border-radius: 50%;
    background: radial-gradient(closest-side, rgba(255,107,0,0.55), rgba(255,107,0,0.18) 40%, transparent 70%);
    filter: blur(8px);
    animation: nl-breath 7s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes nl-breath {
    0%, 100% { transform: translate3d(0,0,0) scale(1);   opacity: 0.85; }
    50%      { transform: translate3d(-12px,-6px,0) scale(1.06); opacity: 1; }
  }

  /* hairline orange divider running along the bottom edge */
  .nl-edge {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 1px;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(255,107,0,0.0) 8%,
      rgba(255,107,0,0.5) 55%,
      rgba(255,107,0,0.9) 80%,
      rgba(255,107,0,0.3) 100%);
    z-index: 1;
  }

  /* content row */
  .nl-row {
    position: relative;
    z-index: 2;
    height: 100%;
    padding: 0 18px 0 16px;
    display: grid;
    grid-template-columns: auto 1px 1fr auto;
    align-items: center;
    gap: 18px;
  }

  /* LOGO ------------------------------------------------------ */
  .nl-logo {
    width: 52px;
    height: 52px;
    border-radius: 12px;
    background:
      radial-gradient(120% 120% at 30% 20%, rgba(255,255,255,0.06), transparent 60%),
      linear-gradient(160deg, #181818 0%, #0a0a0a 100%);
    border: 1px solid rgba(255,255,255,0.10);
    display: grid;
    place-items: center;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.06),
      0 0 24px rgba(255,107,0,0.20);
    flex-shrink: 0;
    overflow: hidden;
  }
  .nl-logo img {
    width: 52px;
    height: 52px;
    display: block;
    /* drop the JPEG's black square so only the white N shows on the chip */
    mix-blend-mode: screen;
    filter: drop-shadow(0 0 6px rgba(255,107,0,0.30));
  }

  /* DIVIDER --------------------------------------------------- */
  .nl-divider {
    width: 1px;
    height: 44px;
    background: linear-gradient(180deg,
      transparent 0%,
      rgba(255,255,255,0.10) 30%,
      rgba(255,255,255,0.10) 70%,
      transparent 100%);
  }

  /* COPY ------------------------------------------------------ */
  .nl-copy {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 6px;
    min-width: 0;
    text-align: center;
  }

  .nl-headline {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--white);
    line-height: 22px;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* rotating-word slot — fixed width prevents layout jitter
     right-aligned so every word sits flush against "tu negocio" */
  .nl-rotator {
    position: relative;
    display: inline-block;
    height: 22px;
    width: 122px;            /* fits "Automatiza" */
    vertical-align: baseline;
    overflow: hidden;
    text-align: right;
  }

  .nl-rotator span {
    position: absolute;
    inset: 0;
    font-weight: 800;
    font-size: 18px;
    line-height: 22px;
    letter-spacing: -0.01em;
    color: var(--orange);
    /* tight glow only — a wide text-shadow gets clipped by the
       rotator's overflow:hidden and reads as an orange rectangle */
    text-shadow: 0 0 6px rgba(255,107,0,0.45);
    opacity: 0;
    transform: translateY(8px);
    animation: nl-rotate 7.5s cubic-bezier(.4,0,.2,1) infinite;
    white-space: nowrap;
  }

  /* JetBrains Mono on the "code-y" tokens for variety */
  .nl-rotator span.mono {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-weight: 600;
    font-size: 17px;
    letter-spacing: -0.01em;
  }

  /* 3 words × 7.5s loop → each gets 2.5s; in/out ~0.35s */
  .nl-rotator span:nth-child(1) { animation-delay: 0s; }
  .nl-rotator span:nth-child(2) { animation-delay: 2.5s; }
  .nl-rotator span:nth-child(3) { animation-delay: 5s; }

  @keyframes nl-rotate {
    0%   { opacity: 0; transform: translateY(10px); }
    5%   { opacity: 1; transform: translateY(0); }
    28%  { opacity: 1; transform: translateY(0); }
    33%  { opacity: 0; transform: translateY(-10px); }
    100% { opacity: 0; transform: translateY(-10px); }
  }

  .nl-sub {
    font-size: 11px;
    font-weight: 500;
    color: var(--gray-2);
    letter-spacing: 0.02em;
    line-height: 1;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }
  .nl-sub .dot {
    width: 3px; height: 3px; border-radius: 50%;
    background: var(--orange);
    box-shadow: 0 0 6px rgba(255,107,0,0.8);
    flex-shrink: 0;
    animation: nl-dot 2.4s ease-in-out infinite;
  }
  @keyframes nl-dot {
    0%, 100% { opacity: 0.55; transform: scale(1); }
    50%      { opacity: 1;    transform: scale(1.25); }
  }
  .nl-sub .mono {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    color: var(--gray-1);
    font-size: 10.5px;
  }

  /* CTA ------------------------------------------------------- */
  .nl-cta {
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    height: 38px;
    padding: 0 16px;
    border-radius: 10px;
    overflow: hidden;            /* clip the sheen sweep to the button */
    background: linear-gradient(180deg, #FF7A1A 0%, #FF6B00 55%, #E55E00 100%);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: -0.005em;
    white-space: nowrap;
    flex-shrink: 0;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.12) inset,
      0 1px 0 rgba(255,255,255,0.25) inset,
      0 8px 18px -8px rgba(255,107,0,0.65),
      0 0 0 1px rgba(255,107,0,0.20);
    transition: transform 220ms cubic-bezier(.4,0,.2,1),
                box-shadow 220ms cubic-bezier(.4,0,.2,1);
  }
  .nl-banner:hover .nl-cta {
    transform: translateY(-1px);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.18) inset,
      0 1px 0 rgba(255,255,255,0.3) inset,
      0 12px 24px -10px rgba(255,107,0,0.85),
      0 0 0 1px rgba(255,107,0,0.35),
      0 0 28px rgba(255,107,0,0.35);
  }

  .nl-cta .arrow {
    display: inline-block;
    width: 14px;
    transition: transform 220ms cubic-bezier(.4,0,.2,1);
  }
  .nl-banner:hover .nl-cta .arrow { transform: translateX(3px); }

  /* nudge the arrow on a slow loop so the eye catches it */
  .nl-cta .arrow {
    animation: nl-arrow 3.5s ease-in-out infinite;
  }
  @keyframes nl-arrow {
    0%, 70%, 100% { transform: translateX(0); }
    80%           { transform: translateX(4px); }
    90%           { transform: translateX(0); }
  }

  /* a very subtle sheen sweep across the CTA every loop */
  .nl-cta::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: linear-gradient(115deg,
      transparent 30%,
      rgba(255,255,255,0.32) 50%,
      transparent 70%);
    transform: translateX(-120%);
    animation: nl-sheen 6s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes nl-sheen {
    0%, 70%, 100% { transform: translateX(-120%); }
    85%           { transform: translateX(120%); }
  }

  /* Reduced motion safeguard */
  @media (prefers-reduced-motion: reduce) {
    .nl-banner::after,
    .nl-rotator span,
    .nl-sub .dot,
    .nl-cta .arrow,
    .nl-cta::before {
      animation: none !important;
    }
    .nl-rotator span:nth-child(1) { opacity: 1; transform: none; }
  }
</style>
